
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/imgs/logoo.svg" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haikyu | Dashboard</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Haikyu | Dashboard</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>
            <a href="../quiz.html" class="btn-quiz">Quiz</a>
            <a href="./sorteio.html" class="btn-sorteio">Sorteio</a>
            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="alerta"></div>

            <div class="btns-dash" id="btnAquario"></div>

            <div class="kpi-global">
                  <div class="kpi" id="kpi_Partidas">
                      <div class="kpi-label">Partidas jogadas</div>
                      <div class="kpi-valor" id="mensagem_partidas">–</div>
                    </div>

                <div class="kpi" id="id_kpi">
                    <div class="kpi-label">Quantidade total de acertos</div>
                    <div class="kpi-valor" id="mensagem_kpi">–</div>
                </div>

                <div class="kpi" id="kpi_Max">
                    <div class="kpi-label">Maior pontuação</div>
                    <div class="kpi-valor" id="mensagem_max">–</div>
                </div>
              
            </div>

            <div id="graficos">
                <canvas id="myChart" role="img" aria-label="Gráfico de linha com pontuação do quiz ao longo do tempo">Histórico de pontuações do quiz.</canvas>
            </div>
        </div>
    </div>

</body>

</html>
<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function exibirGrafico() {
        var data = []
        var valor = []
        var idUsuario = sessionStorage.getItem("ID_USUARIO")
        console.log(idUsuario)
        fetch('/quiz/grafico', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idUsuarioServer: idUsuario
            })
        })
            .then(function (resposta) {
                resposta.json()
                    .then(function (conversao) {
                        for (let i = 0; i < conversao.length; i++) {
                            data[i] = conversao[i].data_hora
                            valor[i] = conversao[i].pontuacao
                        }
                        const ctx = document.getElementById('myChart');

                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: data,
                                datasets: [{
                                    label: 'Pontuação do quiz',
                                    data: valor,
                                    borderWidth: 2,
                                    borderColor: "#e47900",
                                    backgroundColor: "rgba(228,121,0,0.15)",
                                    pointBackgroundColor: "#e47900",
                                    pointRadius: 5,
                                    fill: true,
                                    tension: 0.4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: { color: '#aaa' },
                                        grid: { color: 'rgba(255,255,255,0.07)' }
                                    },
                                    x: {
                                        ticks: { color: '#aaa' },
                                        grid: { color: 'rgba(255,255,255,0.07)' }
                                    }
                                }
                            }
                        });
                    }).catch(function (Erro) {
                        console.log(Erro)
                    })
            }).catch(function (erro) {
                console.log(erro)
            })
    }

    function buscarTotalPonto() {
        var idUsuario = sessionStorage.ID_USUARIO;
        fetch(`/quiz/buscarTotalPontos/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(res => res.json())
            .then(data => {
                mensagem_kpi.innerHTML = data[0].pontos;
            }).catch(function (erro) {
                console.log(erro);
            })
        return false;
    }

    function buscarMaxPonto() {
        var idUsuario = sessionStorage.ID_USUARIO;
        fetch(`/quiz/buscarMaxPontos/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(res => res.json())
            .then(data => {
                mensagem_max.innerHTML = data[0].pontos;
            }).catch(function (erro) {
                console.log(erro);
            })
        return false;
    }
 window.onload = exibirGrafico;

    function buscarTotalPartidas() {
    var idUsuario = sessionStorage.ID_USUARIO;
    fetch(`/quiz/buscarTotalPartidas/${idUsuario}`, {
        method: "GET",
        headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(data => {
        mensagem_partidas.innerHTML = data[0].partidas;
    })
    .catch(err => console.log(err));
}


    buscarTotalPonto();
    buscarMaxPonto();

buscarTotalPartidas(); 
   

</script>
